# evolve.toml — project-level configuration for evolve itself
# See SPEC.md § Config resolution for the full list of supported fields.

check = "pytest"
rounds = 100
# Hard 20-second ceiling on the test suite.  If pytest takes longer
# the round fires its post-check diagnostic and the agent is
# instructed to investigate slowness (mark the slow test, tighten a
# fixture) rather than bump the budget.  The suite staying fast is a
# quality invariant — see SPEC.md § "The --timeout flag".
timeout = 20
model = "claude-opus-4-6"
allow_installs = true
capture_frames = true

# Evolve converges to SPEC.md, not README.md.
# README.md is the user-facing documentation and is kept stable;
# SPEC.md is the dense contract the agent validates claim-by-claim.
spec = "SPEC.md"
